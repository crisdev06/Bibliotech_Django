{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/formularios.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Bibliotech - Iniciar Sesión</title>
</head>

<body>
    <div id="main-container">
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'index' %}">BiblioTech</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'index' %}">volver al Inicio</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>

        <section class="bg-light" style="min-height: 80vh; display: flex; align-items: center;">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-5 col-lg-4">

                        <div class="container shadow border-0 rounded bg-white">
                            <div class="p-4">
                                <h3 class="text-center mb-4 fw-bold text-primary">Iniciar Sesión</h3>

                                <form method="POST">

                                    {% csrf_token %}

                                    {% if form.errors %}
                                    <div class="alert alert-danger text-center py-2 mb-3 small">
                                        Usuario o contraseña incorrectos.
                                    </div>
                                    {% endif %}

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">RUT</label>
                                        <input type="text" class="form-control" name="username"
                                            placeholder="Ingresa tu usuario" required autofocus>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-bold">Contraseña</label>
                                        <input type="password" class="form-control" name="password" placeholder="******"
                                            required>
                                    </div>

                                    <div class="d-grid gap-2 ">
                                        <button type="submit" class="btn btn-primary fw-bold">Entrar</button>
                                        <a href="{% url 'registrar_cliente' %}"
                                            class="btn btn-primary fw-bold">Registrarse
                                        </a>
                                    </div>
                                </form>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <footer class="site-footer mt-auto">
            <div id="footer-container">
                <div class="footer-top">©️ 2025 Todos los Derechos Reservados. <br> Descubre la experiencia de la
                    lectura
                    Física/digital - Bibliotech</div>
                <ul class="footer-links">
                    <li><a class="link" href="https://github.com/crisdev06/BiblioTech" target="_blank" rel="noreferrer">
                            <img class="logo" src="{% static 'icons/github.png' %}" alt="Logo github">
                        </a>
                    </li>
                    <li><a class="link" href="https://portal.inacap.cl" target="_blank">
                            <img class="logo" src="{% static 'icons/inacap.png' %}" alt="Logo inacap">
                        </a>
                    </li>
                </ul>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
